aid: paycor
name: Paycor
description: >-
  Paycor is a cloud-based human capital management (HCM) platform that
  provides payroll, HR, benefits administration, talent management, time and
  attendance, and workforce analytics for small and mid-sized businesses.
  The platform serves HR and finance teams with a unified system of record
  for employees, pay, time, and benefits data. Paycor exposes a Public REST
  API authenticated via OAuth 2.0 with authorization at secure.paycor.com and
  resource endpoints at apis.paycor.com (production) and apis-sandbox.paycor.com
  (sandbox).
type: Index
