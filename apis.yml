apis:
  - aid: paycor:public-api
    name: Paycor Public API v1
    description: >-
      REST API for accessing Paycor employees, payroll, benefits, time, and
      organizational data. Uses OAuth 2.0 authorization code flow with
      authorization at secure.paycor.com/connect/authorize and tokens issued
      by apis.paycor.com/sts/v1/common/token.
    humanURL: https://developers.paycor.com/explore
