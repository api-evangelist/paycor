features:
  - name: Payroll Processing
    description: >-
      End-to-end payroll processing with tax filing, direct deposit, and
      multi-state and multi-EIN support for US employers.
  - name: HR Management
    description: >-
      Employee records, onboarding, document management, and HR workflow
      automation for small and mid-sized businesses.
  - name: Benefits Administration
    description: >-
      Open enrollment, carrier connections, and ongoing benefits
      administration integrated with payroll deductions.
  - name: Time and Attendance
    description: >-
      Time tracking, scheduling, and attendance management feeding directly
      into payroll calculations.
  - name: Talent Management
    description: >-
      Recruiting, applicant tracking, performance reviews, learning, and
      compensation planning in a unified HCM suite.
  - name: Workforce Analytics
    description: >-
      Dashboards and reporting on headcount, turnover, compensation, and
      labor cost trends for HR and finance leaders.
